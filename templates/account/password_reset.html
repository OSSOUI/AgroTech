{% extends "base.html" %}
{% block title %}Mot de passe oublié — AgroTech{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-100 rounded-2xl mb-4">
        <svg class="w-7 h-7 text-emerald-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Mot de passe oublié ?</h1>
      <p class="text-gray-500 text-sm mt-2">
        Entrez votre adresse e-mail et nous vous enverrons un lien pour réinitialiser votre mot de passe.
      </p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <form method="post">
        {% csrf_token %}
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Adresse e-mail</label>
          <input type="email" name="email" required autofocus
                 placeholder="vous@exemple.com"
                 class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition text-gray-700 placeholder-gray-400">
        </div>
        <button type="submit"
                class="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-3.5 rounded-xl font-semibold transition">
          Envoyer le lien de réinitialisation
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="{% url 'accounts:connexion' %}" class="text-sm text-emerald-700 hover:underline">
          ← Retour à la connexion
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
