{% extends "base.html" %}
{% block title %}Mot de passe modifié — AgroTech{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md text-center">

    <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 rounded-2xl mb-6">
      <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-3">Mot de passe mis à jour !</h1>
    <p class="text-gray-500 text-sm mb-8">
      Votre mot de passe a été réinitialisé avec succès.<br>
      Vous pouvez maintenant vous connecter avec vos nouveaux identifiants.
    </p>

    <a href="{% url 'accounts:connexion' %}"
       class="inline-block bg-emerald-700 hover:bg-emerald-800 text-white px-8 py-3 rounded-xl font-semibold transition">
      Se connecter
    </a>

  </div>
</div>
{% endblock %}
