{% extends "base.html" %}
{% block title %}Supprimer l'annonce — AgroTech{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 max-w-md w-full text-center">
    <div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
      <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-gray-900 mb-2">Supprimer cette annonce ?</h1>
    <p class="text-gray-500 text-sm mb-2">{{ annonce.titre }}</p>
    <p class="text-gray-400 text-xs mb-6">Cette action est irréversible. Toutes les photos associées seront également supprimées.</p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
              class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition">
        Confirmer la suppression
      </button>
      <a href="{{ annonce.get_absolute_url }}"
         class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2.5 rounded-xl font-semibold text-sm transition">
        Annuler
      </a>
    </form>
  </div>
</div>
{% endblock %}
